{% extends 'base.html' %}
{% block title %}Login - Deployer{% endblock %}
{% block content %}
<div style="max-width:440px;margin:40px auto;">
  <div class="glass" style="padding:40px;border-radius:20px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:56px;margin-bottom:12px;" class="float-icon">🔐</div>
      <h1 class="gradient-text" style="font-size:28px;margin-bottom:6px;">Welcome Back</h1>
      <p style="color:var(--muted);font-size:15px;">Login to access your projects</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">👤 Username</label>
        <input type="text" name="username" class="form-input" required placeholder="Enter your username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">🔑 Password</label>
        <input type="password" name="password" class="form-input" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary w-full" style="font-size:15px;padding:13px;margin-top:8px;">
        🚀 Login
      </button>
    </form>
    <div style="text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid var(--border);">
      <p style="color:var(--muted);margin-bottom:10px;">Don't have an account?</p>
      <a href="{% url 'register' %}" class="btn w-full" style="font-size:15px;padding:12px;">✨ Create Account</a>
    </div>
  </div>
</div>
{% endblock %}
