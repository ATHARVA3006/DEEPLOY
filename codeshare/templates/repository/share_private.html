<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Project — Deployer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d1117,#161b22);color:#e6edf3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
    .card{background:rgba(22,27,34,.8);border:1px solid rgba(48,54,61,.6);border-radius:20px;padding:48px 40px;max-width:420px;width:100%}
    .icon{font-size:64px;margin-bottom:20px}
    h1{font-size:24px;font-weight:800;margin-bottom:10px}
    p{color:#8b949e;font-size:15px;line-height:1.6;margin-bottom:24px}
    a{display:inline-block;padding:11px 24px;border-radius:8px;background:linear-gradient(135deg,#58a6ff,#388bfd);color:#fff;text-decoration:none;font-weight:600;font-size:14px}
    .brand{position:fixed;top:20px;left:24px;font-size:18px;font-weight:700;background:linear-gradient(135deg,#58a6ff,#a371f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
  </style>
</head>
<body>
  <a href="/" class="brand">🚀 Deployer</a>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>This project is private</h1>
